    <div class="pass-group">
        <input type="password" id="sifreKutusu" class="pass-input" placeholder="Şifrenizi girin..." />

<script>
    const part1 = "ghp_IZJWJ7R65mUfpNvT";
    const part2 = "8Yb0N88teksW6Q1pTDQJ";
    const TOKEN = part1 + part2;
    const USER = "polat58furkan";
    const REPO = "Web";
    const FILE_PATH = "pano3.html"; 

    const API_URL = `https://api.github.com/repos/${USER}/${REPO}/contents/${FILE_PATH}`;
    const panoAlan = document.getElementById('panoAlan');
    const sifreKutusu = document.getElementById('sifreKutusu');
    const durum = document.getElementById('durum');

    // Safe Base64 Helper
    function bufferToBase64(buf) {
        let binary = '';
        const bytes = new Uint8Array(buf);
        for (let i = 0; i < bytes.byteLength; i++) {
            binary += String.fromCharCode(bytes[i]);
        }
        return btoa(binary);
    }

    function base64ToBuffer(b64) {
        const binary = atob(b64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) {
            bytes[i] = binary.charCodeAt(i);
        }
        return bytes.buffer;
    }

    // Anahtar türetme (PBKDF2)
    async function getKey(password, salt) {
        const enc = new TextEncoder();
        const keyMaterial = await crypto.subtle.importKey(
            "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
        );
        return crypto.subtle.deriveKey(
            { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
            keyMaterial,
            { name: "AES-GCM", length: 256 },
            false,
            ["encrypt", "decrypt"]
        );
    }

    // Metni AES-GCM ile Şifrele
    async function encryptText(text, password) {
        const salt = crypto.getRandomValues(new Uint8Array(16));
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const key = await getKey(password, salt);
        const enc = new TextEncoder();
        
        const encrypted = await crypto.subtle.encrypt(
            { name: "AES-GCM", iv: iv }, key, enc.encode(text)
        );

        const payload = {
            s: bufferToBase64(salt),
            i: bufferToBase64(iv),
            d: bufferToBase64(encrypted)
        };

        return "ENC:" + btoa(JSON.stringify(payload));
    }

    // Şifreli Metni Çöz
    async function decryptText(encryptedPackage, password) {
        if (!encryptedPackage.startsWith("ENC:")) {
            return encryptedPackage; // Şifrelenmemiş düz metinse direkt dön
        }

        try {
            const rawB64 = encryptedPackage.replace("ENC:", "");
            const payload = JSON.parse(atob(rawB64));
            
            const salt = base64ToBuffer(payload.s);
            const iv = base64ToBuffer(payload.i);
            const data = base64ToBuffer(payload.d);
            
            const key = await getKey(password, new Uint8Array(salt));
            const decrypted = await crypto.subtle.decrypt(
                { name: "AES-GCM", iv: new Uint8Array(iv) }, key, data
            );

            const dec = new TextDecoder();
            return dec.decode(decrypted);
        } catch (e) {
            throw new Error("Hatalı Şifre!");
        }
    }

    // Şifre Çöz Butonu Fonksiyonu
    async function metniCoz() {
        const pass = sifreKutusu.value;
        if (!pass) {
            durum.innerText = "⚠️ Lütfen önce şifreyi girin!";
            durum.style.color = "#ff9800";
            return;
        }

        try {
            const cozulmus = await decryptText(panoAlan.value, pass);
            panoAlan.value = cozulmus;
            durum.innerText = "✓ Şifre başarıyla çözüldü!";
            durum.style.color = "#28a745";
        } catch (err) {
            durum.innerText = "❌ Hata: " + err.message;
            durum.style.color = "#dc3545";
        }
    }

    // GitHub'a Kaydetme Fonksiyonu (Şifreleyerek)
    async function veriyiKaydet(silmeModu = false) {
        const pass = sifreKutusu.value;

        if (!silmeModu && !pass) {
            durum.innerText = "⚠️ Kaydetmek için bir şifre belirlemelisiniz!";
            durum.style.color = "#ff9800";
            return;
        }

        durum.innerText = "Metin şifreleniyor ve GitHub güncelleniyor...";
        durum.style.color = "#888";

        try {
            let saklanacakMetin = "";
            if (!silmeModu) {
                saklanacakMetin = await encryptText(panoAlan.value, pass);
            }

            const getRes = await fetch(API_URL, { headers: { "Authorization": `token ${TOKEN}` } });
            if (!getRes.ok) throw new Error("Mevcut dosya çekilemedi.");
            const getData = await getRes.json();
            const currentSha = getData.sha;

            const tamHtml = decodeURIComponent(atob(getData.content).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));

            const regex = /(<textarea id="panoAlan"[^>]*>)([\s\S]*?)(<\/textarea>)/;
            const yeniHtml = tamHtml.replace(regex, `$1${saklanacakMetin}$3`);

            const b64Text = btoa(encodeURIComponent(yeniHtml).replace(/%([0-9A-F]{2})/g, function(match, p1) {
                return String.fromCharCode('0x' + p1);
            }));

            const putRes = await fetch(API_URL, {
                method: 'PUT',
                headers: { "Authorization": `token ${TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: silmeModu ? "Pano silindi" : "Sifreli pano güncellendi",
                    content: b64Text,
                    sha: currentSha
                })
            });

            if (putRes.ok) {
                durum.innerText = silmeModu ? "✓ Pano temizlendi!" : "✓ Başarıyla şifrelenip kaydedildi!";
                durum.style.color = "#28a745";
                if (silmeModu) panoAlan.value = "";
            } else {
                throw new Error("Yazma hatası.");
            }
        } catch (error) {
            durum.innerText = "Hata: Güncelleme başarısız! " + error.message;
            durum.style.color = "#dc3545";
        }
    }

    function veriyiSil() {
        if (confirm("Panoyu tamamen temizlemek istiyor musun?")) {
            veriyiKaydet(true);
        }
    }

    function panoyaKopyala() {
        panoAlan.select();
        document.execCommand('copy');
        durum.innerText = "✓ Panoya kopyalandı!";
        setTimeout(() => { durum.innerText = "✓ Hazır."; }, 2000);
    }
