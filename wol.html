<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kral PC Kontrol Paneli</title>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: #fff; text-align: center; padding-top: 50px; }
        .container { background: #1e1e1e; display: inline-block; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 320px; }
        h1 { color: #00adb5; font-size: 24px; margin-bottom: 20px; }
        .btn { border: none; color: white; padding: 15px 20px; text-align: center; font-size: 16px; margin: 8px 0; cursor: pointer; border-radius: 8px; font-weight: bold; transition: 0.3s; width: 100%; display: block; }
        .btn-open { background: #00adb5; }
        .btn-open:hover { background: #007a80; }
        .btn-reset { background: #e74c3c; }
        .btn-reset:hover { background: #c0392b; }
        #status { margin-top: 15px; font-size: 14px; color: #aaa; font-weight: 500; min-hieght: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Kral PC Kontrol Panel</h1>
    <p style="font-size: 14px; color: #888;">PC'yi yönetmek için aşağıdaki butonları kullan.</p>
    
    <button id="wakeBtn" class="btn btn-open">💻 BİLGİSAYARI AÇ (1 YAP)</button>
    
    <button id="resetBtn" class="btn btn-reset">🔄 TETİĞİ SIFIRLA (0 YAP)</button>
    
    <div id="status">Durum kontrol ediliyor...</div>
</div>

<script>
    // GitHub Bilgilerin
    const OWNER = "polat58furkan";
    const REPO = "Web";
    const PATH = "durum.json"; // Eğer bir klasörün içindeyse klasor/durum.json yaz
    const part1 = "ghp_W8jGbJHPLEfTvOo";
    const part2 = "LRLIpevdyOCx5AZ32EXpv";
    const TOKEN = part1 + part2;

    const wakeBtn = document.getElementById('wakeBtn');
    const resetBtn = document.getElementById('resetBtn');
    const statusDiv = document.getElementById('status');

    // Ortak GitHub Güncelleme Fonksiyonu
    async function githubDurumGuncelle(yeniDeger) {
        statusDiv.style.color = "#aaa";
        statusDiv.innerText = "GitHub güncelleniyor...";
        
        try {
            // 1. Güncel SHA kodunu al
            const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`, {
                headers: {
                    'Authorization': `Bearer ${TOKEN}`,
                    'Accept': 'application/vnd.github+json'
                }
            });
            
            if(!res.ok) throw new Error("Dosya bilgisi alınamadı. Konfigürasyonu kontrol et.");
            const data = await res.json();
            const sha = data.sha;

            // 2. İçeriği hazırla
            const updatedContent = btoa(JSON.stringify({ "tetik": yeniDeger }));

            // 3. GitHub'a gönder
            const putRes = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${TOKEN}`,
                    'Accept': 'application/vnd.github+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: `WoL Durumu ${yeniDeger} Yapildi`,
                    content: updatedContent,
                    sha: sha
                })
            });

            if(putRes.ok) {
                if(yeniDeger === 1) {
                    statusDiv.innerHTML = "<span style='color:#2ecc71;'>🚀 Bilgisayarı Açma Emri Gönderildi! (1)</span>";
                } else {
                    statusDiv.innerHTML = "<span style='color:#e67e22;'>🔄 Tetik Başarıyla Sıfırlandı! (0)</span>";
                }
            } else {
                const errorData = await putRes.json();
                statusDiv.innerText = "İşlem başarısız: " + errorData.message;
            }
        } catch (err) {
            statusDiv.style.color = "#e74c3c";
            statusDiv.innerText = "Hata: " + err.message;
        }
    }

    // Buton Dinleyicileri
    wakeBtn.addEventListener('click', () => githubDurumGuncelle(1));
    resetBtn.addEventListener('click', () => githubDurumGuncelle(0));
</script>
</body>
</html>
