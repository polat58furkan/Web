<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Anlık Pano</title>
    <!-- Bulut senkronizasyonu sağlayan GunDB kütüphanesi -->
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 700px; }
        textarea { width: 100%; height: 350px; background: #1e1e1e; color: #fff; border: 1px solid #333; padding: 15px; border-radius: 6px; font-size: 15px; resize: vertical; }
        textarea:focus { outline: none; border-color: #007acc; }
        button { background: #28a745; color: white; border: none; padding: 12px 20px; margin-top: 10px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:hover { background: #218838; }
        .status { margin-top: 10px; font-size: 13px; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚡ Anlık Senkronize Pano</h2>
    <p style="font-size: 13px; color: #aaa;">Buraya yazdığın her şey anında bulut üzerinden diğer bilgisayarına aktarılır.</p>
    
    <textarea id="panoAlan" placeholder="Bağlantı kuruluyor..."></textarea>
    <br>
    <button onclick="panoyaKopyala()">📋 Metni Kopyala</button>
    
    <div class="status" id="durum">Bağlanıyor...</div>
</div>

<script>
    // Ücretsiz ve halka açık GunDB sunucuları (Veriyi anlık taşımak için)
    const gun = Gun([
        'https://gun-manhattan.herokuapp.com/gun',
        'https://rawcdn.githack.com/amark/gun/master/gun.js'
    ]);

    // Sadece senin bileceğin gizli bir oda adı. 
    // Bunu istediğin gibi değiştirebilirsin (Örn: 'furkan_pano_99')
    const ODA_ADI = 'furkan_ozel_pano_34'; 
    const db = gun.get(ODA_ADI);

    const panoAlan = document.getElementById('panoAlan');
    const durum = document.getElementById('durum');

    // Buluttan veriyi anlık dinle ve textarea'ya bas
    db.get('metin').on((data) => {
        if (data !== undefined) {
            // Eğer kullanıcı şu an aktif olarak yazmıyorsa içeriği güncelle
            if (document.activeElement !== panoAlan) {
                panoAlan.value = data;
            }
        }
        durum.innerText = "✓ Bağlantı aktif. Değişiklikler anlık eşitlenir.";
        durum.style.color = "#28a745";
    });

    // Kullanıcı klavyeden her tuşa bastığında buluttaki veriyi anında güncelle
    panoAlan.addEventListener('input', () => {
        db.get('metin').put(panoAlan.value);
    });

    function panoyaKopyala() {
        panoAlan.select();
        document.execCommand('copy');
        durum.innerText = "✓ Kopyalandı!";
        setTimeout(() => { durum.innerText = "✓ Bağlantı aktif. Değişiklikler anlık eşitlenir."; }, 2000);
    }
</script>

</body>
</html>
