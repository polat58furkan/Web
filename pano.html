<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Kişisel Pano</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 700px; }
        textarea { width: 100%; height: 350px; background: #1e1e1e; color: #fff; border: 1px solid #333; padding: 15px; border-radius: 6px; font-size: 15px; resize: vertical; }
        textarea:focus { outline: none; border-color: #007acc; }
        .btn-group { margin-top: 15px; display: flex; gap: 10px; }
        button { color: white; border: none; padding: 12px 24px; font-size: 14px; font-weight: bold; border-radius: 4px; cursor: pointer; transition: background 0.2s; }
        .btn-save { background-color: #007acc; }
        .btn-save:hover { background-color: #005999; }
        .btn-copy { background-color: #28a745; }
        .btn-copy:hover { background-color: #218838; }
        .btn-delete { background-color: #dc3545; }
        .btn-delete:hover { background-color: #c82333; }
        .status { margin-top: 15px; font-size: 13px; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <h2>📋 Tamamen Yerel GitHub Panosu</h2>
    <p style="font-size: 13px; color: #aaa;">Veriler sadece senin GitHub repository'nde saklanır. Üçüncü parti bulut kullanılmaz.</p>
    
    <textarea id="panoAlan" placeholder="GitHub'dan veri getiriliyor..."></textarea>
    
    <div class="btn-group">
        <button class="btn-save" onclick="veriyiKaydet()">Değişiklikleri Kaydet</button>
        <button class="btn-copy" onclick="panoyaKopyala()">Metni Kopyala</button>
        <button class="btn-delete" onclick="veriyiSil()">Panoyu Sil</button>
    </div>
    
    <div class="status" id="durum">Yükleniyor...</div>
</div>

<script>
    // GITHUB BİLGİLERİNİ BURAYA GİR
    const part1 = "ghp_IZJWJ7R65mUfpNvT";
    const part2 = "8Yb0N88teksW6Q1pTDQJ";
    const TOKEN = part1 + part2;
    const USER = "polat58furkan";
    const REPO = "Web"; // Örn: web-sitem
    const FILE_PATH = "veri_pano.txt"; // Verinin yazılacağı dosya adı

    const API_URL = `https://api.github.com/repos/${USER}/${REPO}/contents/${FILE_PATH}`;

    const panoAlan = document.getElementById('panoAlan');
    const durum = document.getElementById('durum');
    let currentSha = null; // GitHub'ın dosya versiyon kontrolü için gerekli

    // Sayfa açıldığında doğrudan senin GitHub dosyandan veriyi oku
    async function veriyiCek() {
        durum.innerText = "GitHub'dan veri çekiliyor...";
        try {
            const response = await fetch(API_URL, {
                headers: { "Authorization": `token ${TOKEN}` }
            });
            
            if (response.ok) {
                const data = await response.json();
                currentSha = data.sha;
                // GitHub veriyi Base64 saklar, çözüp ekrana basıyoruz (Türkçe karakter desteğiyle)
                const decodedText = decodeURIComponent(atob(data.content).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                
                panoAlan.value = decodedText;
                durum.innerText = "✓ Veri kendi GitHub'ından başarıyla yüklendi.";
                durum.style.color = "#28a745";
            } else if (response.status === 404) {
                panoAlan.value = "";
                durum.innerText = "Pano şu an boş. İlk yazınızı yazıp kaydedebilirsiniz.";
            }
        } catch (error) {
            durum.innerText = "Hata: GitHub'a bağlanılamadı!";
            durum.style.color = "#dc3545";
        }
    }

    // Doğrudan senin GitHub'ındaki dosyaya yazar
    async function veriyiKaydet(silmeModu = false) {
        durum.innerText = "GitHub güncelleniyor...";
        durum.style.color = "#888";
        
        const textToSave = silmeModu ? "" : panoAlan.value;
        
        // Türkçe karakter hatası olmaması için düzgünce Base64'e çeviriyoruz
        const b64Text = btoa(encodeURIComponent(textToSave).replace(/%([0-9A-F]{2})/g, function(match, p1) {
            return String.fromCharCode('0x' + p1);
        }));

        const bodyData = {
            message: silmeModu ? "Panoyu temizle" : "Pano guncellendi",
            content: b64Text
        };
        
        if (currentSha) {
            bodyData.sha = currentSha;
        }

        try {
            const response = await fetch(API_URL, {
                method: 'PUT',
                headers: {
                    "Authorization": `token ${TOKEN}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(bodyData)
            });

            if (response.ok) {
                const resData = await response.json();
                currentSha = resData.content.sha; // Yeni SHA'yı kaydet
                
                if(silmeModu) {
                    panoAlan.value = "";
                    durum.innerText = "✓ Pano başarıyla sıfırlandı ve dosya temizlendi.";
                    durum.style.color = "#dc3545";
                } else {
                    durum.innerText = "✓ Değişiklikler doğrudan senin GitHub'ına kaydedildi!";
                    durum.style.color = "#28a745";
                }
            } else {
                throw new Error("GitHub yazma hatası");
            }
        } catch (error) {
            durum.innerText = "Hata: GitHub'a yazılamadı!";
            durum.style.color = "#dc3545";
        }
    }

    function veriyiSil() {
        if (confirm("Panoyu tamamen temizlemek istiyor musun?")) {
            veriyiKaydet(true);
        }
    }

    function panoyaKopyala() {
        panoAlan.select();
        document.execCommand('copy');
        const eskiYazi = durum.innerText;
        durum.innerText = "✓ Panoya kopyalandı!";
        setTimeout(() => { durum.innerText = eskiyazi; }, 2000);
    }

    veriyiCek();
</script>

</body>
</html>
