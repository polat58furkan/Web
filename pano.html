<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Güvenli Pano</title>
    <!-- Şifreleme için güvenilir Crypto-JS kütüphanesini CDN üzerinden çekiyoruz -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 700px; }
        textarea { width: 100%; height: 300px; background: #1e1e1e; color: #fff; border: 1px solid #333; padding: 15px; border-radius: 6px; font-size: 15px; resize: vertical; }
        button { background: #007acc; color: white; border: none; padding: 12px 20px; margin-top: 10px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:hover { background: #005999; }
        .btn-copy { background: #28a745; }
        .btn-copy:hover { background: #218838; }
        .info { margin-top: 15px; font-size: 13px; color: #888; word-break: break-all; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔒 Şifreli Kişisel Pano</h2>
    <p style="font-size: 13px; color: #aaa;">Metin sadece linkin içinde şifreli olarak taşınır. Sunucuya hiçbir şey kaydedilmez.</p>
    
    <textarea id="panoAlan" placeholder="Metninizi buraya yapıştırın..."></textarea>
    <br>
    <button onclick="linkOlustur()">🔗 Şifreli Link Oluştur</button>
    <button onclick="panoyaKopyala()" class="btn-copy">📋 Metni Kopyala</button>
    
    <div class="info" id="linkDurumu"></div>
</div>

<script>
    // Sadece senin bileceğin gizli bir anahtar (Şifreleme parolası)
    // Bunu dilediğin gibi değiştirebilirsin
    const GIZLI_ANAHTAR = "Furkanin_Gizli_Anahtari_123!";

    // Sayfa açıldığında URL'de şifreli veri var mı kontrol et
    window.addEventListener('DOMContentLoaded', () => {
        const hash = window.location.hash.substring(1); // URL'deki # sonrasını al
        if (hash) {
            try {
                // Şifreli metni çöz (AES-256)
                const bytes = CryptoJS.AES.decrypt(decodeURIComponent(hash), GIZLI_ANAHTAR);
                const orijinalMetin = bytes.toString(CryptoJS.enc.Utf8);
                
                if (orijinalMetin) {
                    document.getElementById('panoAlan').value = orijinalMetin;
                    document.getElementById('linkDurumu').innerHTML = "<span style='color:#28a745;'>✓ Şifreli veri başarıyla çözüldü ve sayfaya yüklendi!</span>";
                } else {
                    document.getElementById('panoAlan').placeholder = "Şifre çözülemedi. Geçersiz link veya hatalı anahtar!";
                }
            } catch (e) {
                document.getElementById('panoAlan').placeholder = "Şifre çözme hatası!";
            }
        }
    });

    // Kendi bilgisayarında metni yazıp butona bastığında çalışacak fonksiyon
    function linkOlustur() {
        const metin = document.getElementById('panoAlan').value;
        if (!metin) { alert("Lütfen önce bir metin girin!"); return; }

        // Metni AES ile şifrele
        const sifreli = CryptoJS.AES.encrypt(metin, GIZLI_ANAHTAR).toString();
        
        // Yeni URL'yi oluştur (#şifreli_metin şeklinde ekler)
        const yeniURL = window.location.origin + window.location.pathname + "#" + encodeURIComponent(sifreli);
        
        // Linki ekrana bas ve otomatik hafızaya kopyala
        navigator.clipboard.writeText(yeniURL);
        
        document.getElementById('linkDurumu').innerHTML = `
            <strong style="color:#007acc;">✓ Yeni Şifreli Link Oluşturuldu ve Hafızaya Kopyalandı!</strong><br>
            <span style="font-size:11px;">Bu linki iş bilgisayarına bir şekilde (örn: mail atarak veya bir yere yazarak) ulaştırıp tarayıcıda açman yeterli.</span>
        `;
    }

    function panoyaKopyala() {
        const area = document.getElementById('panoAlan');
        area.select();
        document.execCommand('copy');
        alert("Metin panoya kopyalandı!");
    }
</script>

</body>
</html>
